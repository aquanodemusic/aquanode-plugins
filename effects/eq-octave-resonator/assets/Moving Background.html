<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Cyan Waves Background</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    overflow: hidden;
    width: 100%;
    height: 100%;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let time = 0;

/* ===================== WAVES ===================== */
const waveCount = 16;
const waves = Array.from({ length: waveCount }, (_, i) => ({
  amp: 14 + i * 3,
  freq: 0.003 + i * 0.0003,
  speed: 0.15 + i * 0.03,
  offset: Math.random() * Math.PI * 2,
  alpha: 0.2
}));

function drawWaves() {
  waves.forEach((wave, i) => {
    ctx.beginPath();
    for (let x = 0; x <= w; x += 8) {
      const y =
        h / 2 +
        Math.sin(x * wave.freq + time * wave.speed + wave.offset) *
          wave.amp +
        (i - waveCount / 2) * 18;
      ctx.lineTo(x, y);
    }

    ctx.strokeStyle = `rgba(0, 130, 170, ${wave.alpha})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = "rgba(0, 160, 200, 0.35)";
    ctx.shadowBlur = 6;
    ctx.stroke();
  });

  ctx.shadowBlur = 0;
}

/* ===================== PARTICLES ===================== */
const particles = Array.from({ length: 90 }, () => ({
  x: Math.random() * w,
  y: Math.random() * h,
  r: Math.random() * 1.6 + 0.4,
  vy: Math.random() * 0.3 + 0.05,
  a: Math.random() * 0.25 + 0.1
}));

function drawParticles() {
  particles.forEach(p => {
    p.y -= p.vy;
    if (p.y < -10) {
      p.y = h + 10;
      p.x = Math.random() * w;
    }

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0, 170, 210, ${p.a})`;
    ctx.fill();
  });
}

/* ===================== SPLASHES ===================== */
const splashes = [];

function spawnSplash() {
  splashes.push({
    x: Math.random() * w,
    y: Math.random() * h,
    r: 20 + Math.random() * 60,
    maxR: 140 + Math.random() * 200,
    alpha: 0,
    life: 0,
    speed: 0.15 + Math.random() * 0.25
  });
}

setInterval(() => {
  if (splashes.length < 10) spawnSplash();
}, 1800);

function drawSplashes() {
  splashes.forEach((s, i) => {
    s.life += s.speed;
    s.r += 0.25;

    if (s.life < 30) {
      s.alpha = s.life / 30;
    } else {
      s.alpha -= 0.003;
    }

    const grad = ctx.createRadialGradient(
      s.x, s.y, 0,
      s.x, s.y, s.r
    );
    grad.addColorStop(0, `rgba(0, 140, 200, ${s.alpha * 0.35})`);
    grad.addColorStop(1, `rgba(0, 140, 200, 0)`);

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();

    if (s.alpha <= 0 || s.r > s.maxR) {
      splashes.splice(i, 1);
    }
  });
}

/* ===================== ANIMATION LOOP ===================== */
function animate() {
  ctx.clearRect(0, 0, w, h);

  drawSplashes();   // background ink blooms
  drawWaves();      // sine waves
  drawParticles();  // floating dots

  time += 0.01;
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
