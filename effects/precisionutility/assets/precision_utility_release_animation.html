<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Utility</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #e0f7f4 0%, #c8f0e9 100%);
            overflow: hidden;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Soft organic shapes */
        .shape {
            position: absolute;
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            filter: blur(60px);
            opacity: 0.4;
            animation: morph 25s ease-in-out infinite;
        }

        .shape1 {
            width: 600px;
            height: 600px;
            background: linear-gradient(135deg, rgba(26, 188, 156, 0.5), rgba(52, 211, 153, 0.5));
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .shape2 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.45), rgba(52, 211, 153, 0.45));
            bottom: -100px;
            right: -100px;
            animation-delay: 8s;
        }

        .shape3 {
            width: 450px;
            height: 450px;
            background: linear-gradient(135deg, rgba(20, 184, 166, 0.4), rgba(45, 212, 191, 0.4));
            top: 30%;
            right: 10%;
            animation-delay: 16s;
        }

        .shape4 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.35), rgba(34, 197, 94, 0.35));
            bottom: 20%;
            left: 15%;
            animation-delay: 12s;
        }

        @keyframes morph {
            0%, 100% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
                transform: translate(0, 0) rotate(0deg);
            }
            25% {
                border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%;
                transform: translate(20px, -20px) rotate(90deg);
            }
            50% {
                border-radius: 50% 50% 30% 60% / 40% 50% 60% 50%;
                transform: translate(-20px, 20px) rotate(180deg);
            }
            75% {
                border-radius: 40% 50% 60% 50% / 60% 40% 50% 40%;
                transform: translate(20px, 20px) rotate(270deg);
            }
        }

        /* Floating leaf-like elements */
        .leaf {
            position: absolute;
            width: 40px;
            height: 60px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(52, 211, 153, 0.3));
            border-radius: 0 100% 50% 100%;
            opacity: 0;
            animation: float-leaf 20s ease-in-out infinite;
            filter: blur(1px);
        }

        @keyframes float-leaf {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--rotation));
                opacity: 0;
            }
        }

        /* Gentle light particles */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, rgba(20, 184, 166, 0.7), transparent);
            border-radius: 50%;
            animation: particle-drift 18s ease-in-out infinite;
        }

        @keyframes particle-drift {
            0%, 100% {
                transform: translate(0, 0);
                opacity: 0;
            }
            15% {
                opacity: 0.9;
            }
            85% {
                opacity: 0.6;
            }
            100% {
                transform: translate(var(--dx), var(--dy));
                opacity: 0;
            }
        }

        /* Content */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 3rem;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 60px rgba(16, 185, 129, 0.15);
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 400;
            background: linear-gradient(135deg, #047857, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
            letter-spacing: 0.02em;
            opacity: 0;
            animation: gentle-fade-in 2s ease-out 0.3s forwards;
        }

        .description {
            font-size: clamp(1rem, 2.2vw, 1.4rem);
            color: #047857;
            line-height: 1.8;
            font-weight: 400;
            opacity: 0;
            animation: gentle-fade-in 2s ease-out 0.8s forwards;
        }

        @keyframes gentle-fade-in {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Soft vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(16, 185, 129, 0.05) 100%);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- Soft organic shapes -->
    <div class="shape shape1"></div>
    <div class="shape shape2"></div>
    <div class="shape shape3"></div>
    <div class="shape shape4"></div>

    <!-- Floating leaves -->
    <div id="leaves"></div>

    <!-- Gentle particles -->
    <div id="particles"></div>

    <!-- Vignette -->
    <div class="vignette"></div>

    <!-- Main content -->
    <div class="content">
        <h1>PrecisionUtility</h1>
        <p class="description">
            Versatile Latency / Phase Inversion / Individual Channel Panning Utility Plugin
        </p>
    </div>

    <script>
        // Create floating leaf-like elements
        const leavesContainer = document.getElementById('leaves');
        const leafCount = 15;

        for (let i = 0; i < leafCount; i++) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.style.left = Math.random() * 100 + '%';
            leaf.style.top = Math.random() * 100 + '%';
            leaf.style.setProperty('--tx', (Math.random() - 0.5) * 300 + 'px');
            leaf.style.setProperty('--ty', (Math.random() - 0.5) * 300 + 'px');
            leaf.style.setProperty('--rotation', Math.random() * 360 + 'deg');
            leaf.style.animationDelay = Math.random() * 20 + 's';
            leaf.style.animationDuration = (Math.random() * 10 + 15) + 's';
            
            // Vary leaf sizes slightly
            const scale = 0.7 + Math.random() * 0.6;
            leaf.style.transform = `scale(${scale})`;
            
            leavesContainer.appendChild(leaf);
        }

        // Create gentle light particles
        const particlesContainer = document.getElementById('particles');
        const particleCount = 25;

        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = Math.random() * 100 + '%';
            particle.style.setProperty('--dx', (Math.random() - 0.5) * 150 + 'px');
            particle.style.setProperty('--dy', (Math.random() - 0.5) * 150 + 'px');
            particle.style.animationDelay = Math.random() * 18 + 's';
            particle.style.animationDuration = (Math.random() * 8 + 12) + 's';
            particlesContainer.appendChild(particle);
        }

        // Very subtle mouse parallax
        let mouseX = 0;
        let mouseY = 0;
        let currentX = 0;
        let currentY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 15;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 15;
        });

        function animate() {
            currentX += (mouseX - currentX) * 0.03;
            currentY += (mouseY - currentY) * 0.03;

            document.querySelectorAll('.shape').forEach((shape, index) => {
                const speed = (index + 1) * 0.15;
                shape.style.transform = `translate(${currentX * speed}px, ${currentY * speed}px)`;
            });

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
